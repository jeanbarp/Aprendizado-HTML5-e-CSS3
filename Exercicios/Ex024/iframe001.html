<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe{
            width: 400px;
            height: 400px;
            border: 1px solid brown;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>Acessando o site do 
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500" scolling="auto">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em video</a>
        </iframe>
        curso em video para aprender a programar</p>
    
        <p>o repositório do Jean
            <iframe src="https://github.com/jeanbarp?tab=repositories" frameborder="0">
                <a href="https://github.com/jeanbarp?tab=repositories" target="_blank">repositório</a>
            </iframe>
            tammbem é bem legal!
        </p>
</body>
</html>
