<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            width: 400px;
            border: 1px solid black;
            border-collapse: collapse;
        }
            thead{
                background-color: bisque;
            }

        td, th{
            border: 1px solid black;
            padding: 5px;
        }
        td.num{
            text-align: right;
            width: 100px;
        }
    </style>
</head>
<body>
    <table>
        <caption>Tabela de população</caption>
        <thead>
            <tr>
                <th scope="col">Estado</th>
                <th scope="col">População</th>
            </tr>
        </thead>
            <tr>
                <td>Santa Catarina</td>
                <td class="num">100 000 000</td>
            </tr>
            <tr>
                <td>Rio Grande do Sul</td>
                <td class="num">100 000 050</td>
            </tr>
            <tr>
                <td>Paraná</td>
                <td class="num">100 000 000</td>
            </tr>
        <tbody>

        </tbody>
        <tfoot>
            <th scope="row">Total</th>
            <td>100</td>
        </tfoot>
    </table>
</body>
</html>
